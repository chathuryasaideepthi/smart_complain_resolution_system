{% extends 'base.html' %}
{% block title %}Register | Smart Complaint{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="h4">Create an account</h2>
                    <p class="text-muted">Join the Smart Complaint system as a citizen.</p>
                </div>
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label class="form-label">Full name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Select Department</label>
                        <select class="form-select" name="department_id" required>
                            {% for department in departments %}
                                <option value="{{ department.id }}">{{ department.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3 position-relative">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" id="passwordRegister" required>
                        <button type="button" class="btn btn-sm btn-link position-absolute top-50 end-0 translate-middle-y" onclick="togglePasswordField('passwordRegister')">Show</button>
                    </div>
                    <button class="btn btn-primary w-100">Register</button>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-0">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
