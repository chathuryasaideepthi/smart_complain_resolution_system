{% extends 'base.html' %}
{% block title %}Forgot Password | Smart Complaint{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="h4">Reset password</h2>
                    <p class="text-muted">Enter your email to receive reset instructions.</p>
                </div>
                <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <button class="btn btn-primary w-100">Send reset link</button>
                </form>
                <div class="text-center mt-4">
                    <a href="{{ url_for('auth.login') }}">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
