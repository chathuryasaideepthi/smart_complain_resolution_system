{% extends 'base.html' %}
{% block title %}Login | Smart Complaint{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="h4">Welcome Back</h2>
                    <p class="text-muted">Sign in to continue to Smart Complaint</p>
                </div>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="mb-3 position-relative">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" id="passwordInput" placeholder="Enter password" required>
                        <button type="button" class="btn btn-sm btn-link position-absolute top-50 end-0 translate-middle-y" onclick="togglePassword()">Show</button>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="remember" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
                    </div>
                    <button class="btn btn-primary w-100">Sign In</button>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
